<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us - KrishiKirai</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../static/css/style.css">
</head>
<body>

  <!-- Top Navigation Header -->
  <header class="top-header">
    <div class="logo-container">
      <div class="logo-icon"><i class="fa-solid fa-tractor"></i></div>
      <div class="logo-text">कृषि किराये (KrishiKirai)</div>
    </div>
    <nav class="header-nav">
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="bookings.html">Bookings</a></li>
        <li><a href="account.html">Account</a></li>
        <li class="active"><a href="contact.html">Contact</a></li>
        <li>
          <select class="lang-selector">
            <option>हिन्दी / English</option>
            <option>English</option><option>हिन्दी</option>
          </select>
        </li>
      </ul>
    </nav>
  </header>

  <main style="max-width: 800px; margin: 0 auto; padding: 2rem;">
    <div class="inner-page-header">
      <h1>Contact Support</h1>
      <p>Have a question or need help with a booking? Reach out to us.</p>
    </div>

    <div class="card" style="display: grid; grid-template-columns: 1fr 1fr; gap: 2rem;">
      <div>
        <h3 style="margin-bottom: 1rem; color: var(--primary-green);">Get in Touch</h3>
        <p style="margin-bottom: 0.5rem;"><i class="fa-solid fa-phone" style="width: 25px; color: var(--text-gray);"></i> +91 900590</p>
        <p style="margin-bottom: 0.5rem;"><i class="fa-brands fa-whatsapp" style="width: 25px; color: var(--text-gray);"></i> +91 80000050</p>
        <p style="margin-bottom: 1.5rem;"><i class="fa-solid fa-envelope" style="width: 25px; color: var(--text-gray);"></i> support@krishikirai.com</p>
        
        <h3 style="margin-bottom: 1rem; color: var(--primary-green);">Head Office</h3>
        <p style="color: var(--text-gray); line-height: 1.6;">
          Krishi Bhavan, Sector 14,<br>
          Near APMC Market,<br>
          Pune, Maharashtra 411038
        </p>
      </div>
      
      <div>
        <form>
          <div class="form-group">
            <label for="name">Your Name</label>
            <input type="text" id="name" class="form-control" placeholder="John Doe">
          </div>
          <div class="form-group">
            <label for="subject">Subject</label>
            <input type="text" id="subject" class="form-control" placeholder="Help with booking cancellation">
          </div>
          <div class="form-group">
            <label for="message">Message</label>
            <textarea id="message" class="form-control" rows="5" placeholder="How can we assist you?"></textarea>
          </div>
          <button type="button" class="book-btn" onclick="alert('Message Sent!')">Send Message</button>
        </form>
      </div>
    </div>
  </main>

    <script src="session.js" defer></script>
</body>
</html>
